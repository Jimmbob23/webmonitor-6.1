<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Login · Enterprise 6</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app.css" rel="stylesheet">
</head>
<body class="login-page">
<div class="card login-card">
  <div class="card-body">
    <h1 class="h3 mb-3">Web Monitor Enterprise 6</h1>
    {% if error %}<div class="alert alert-danger">{{error}}</div>{% endif %}
    <form method="post" action="/login">
      <input class="form-control mb-2" name="username" placeholder="Benutzer">
      <input class="form-control mb-3" name="password" type="password" placeholder="Passwort">
      <button class="btn btn-primary w-100">Login</button>
    </form>
  </div>
</div>
</body>
</html>
