services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webmonitor
      POSTGRES_USER: webmonitor
      POSTGRES_PASSWORD: devpassword
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data

  web-monitor:
    build: .
    depends_on:
      - postgres
      - redis
    ports:
      - "8005:8000"
    volumes:
      - ./data/app:/app/data
    environment:
      DATABASE_URL: postgresql+psycopg2://webmonitor:devpassword@postgres:5432/webmonitor
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /app/data
      APP_SECRET: dev-secret-change-me
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin123
